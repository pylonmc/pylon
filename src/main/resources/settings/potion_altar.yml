tick-interval: 10
max-effect-types: 10 # The max types the fused potion can contain

sound:
  start:
    name: minecraft:entity.ender_eye.launch
    source: player
    pitch: 1
    volume: 1
  finish:
    name: minecraft:block.brewing_stand.brew
    source: player
    pitch: 1
    volume: 1
  cancel:
    name: minecraft:entity.ender_eye.death
    source: player
    pitch: 1
    volume: 1
  cannot_apply_catalyst:
    name: minecraft:block.chorus_flower.death
    source: player
    pitch: 1
    volume: 1
  failed_apply_catalyst:
    name: minecraft:entity.iron_golem.death
    source: player
    pitch: 1
    volume: 1
