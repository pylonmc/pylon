name: Java CI with Gradle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "*" ]
  workflow_call:
    inputs:
      version:
        default: ${{ github.run_number }}
        required: false
        type: string

jobs:
  build:
    if: startsWith(github.event.head_commit.message, '[Skip]') == false

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Use reference from [ref title
        id: parseref
        if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, '[ref:')
        run: |
          prefixrm=$(echo "${{github.event.pull_request.title}}" | cut -c6-)
          BRANCHNAME=$(echo "$prefixrm" | cut -d']' -f1)
          git clone https://github.com/pylonmc/rebar
          cd rebar
          git fetch --all
          git checkout $BRANCHNAME
          cd ..

      - name: Get latest commit of Rebar master
        if: steps.parseref.outcome == 'skipped'
        run: |
          git clone https://github.com/pylonmc/rebar

      - name: Get commit of rebar to use
        id: rebarcommit
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          echo "commit=$COMMIT_HASH" >> $GITHUB_OUTPUT

      - name: Set up JDK 25
        uses: actions/setup-java@v4.6.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.2.2

      - name: Clone master project
        uses: actions/checkout@v5
        with:
          repository: 'pylonmc/parallel-dev-repo'

      - name: Clone rebar
        uses: actions/checkout@v5
        with:
          repository: 'pylonmc/rebar'
          ref: ${{steps.}}
          path: 'parallel-dev-repo/rebar'

      - name: Clone pylon
        uses: actions/checkout@v5
        with:
          repository: 'pylonmc/pylon'
          ref: ${{github.sha}}
          path: 'parallel-dev-repo/pylon'

      - name: Build with Gradle Wrapper
        working-directory: parallel-dev-repo
        run: |
          ./gradlew :pylon:shadowJar -Pversion=${{ inputs.version || github.run_number }}

      - name: Upload the artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: pylon-${{ inputs.version || github.run_number }}
          path: 'parallel-dev-repo/pylon/build/libs/pylon-${{ inputs.version || github.run_number }}.jar'

  dependency-submission:
    needs: [build]

    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 25
        uses: actions/setup-java@v4.6.0
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v4.2.2
